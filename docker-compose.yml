services:
  db:
    image: postgres:18-alpine
    container_name: upwork-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upwork_clone
    ports:
      # host:container — 5544 pe host; 5432 și 5433 sunt deja ocupate de Postgres-urile locale
      - '5544:5432'
    volumes:
      # Postgres 18+ stochează datele într-un subdirector; mount-ul se face la rădăcină.
      - upwork_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d upwork_clone']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  upwork_pgdata:
